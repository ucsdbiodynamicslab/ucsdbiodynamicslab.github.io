<div id="random-404"></div>

<script>
const pages = [
  "/pages/404_variants/chip.html",
  "/pages/404_variants/contaminated.html",
  "/pages/404_variants/gene.html",
  "/pages/404_variants/notebook.html",
  "/pages/404_variants/pcr.html",
  "/pages/404_variants/phase.html",
  "/pages/404_variants/plasmid.html",
  "/pages/404_variants/terminal.html",
  "/pages/404_variants/microscope.html"
];

const choice = pages[Math.floor(Math.random() * pages.length)];

fetch(choice)
  .then(response => response.text())
  .then(html => {
    document.getElementById("random-404").innerHTML = html;
  })
  .catch(() => {
    document.getElementById("random-404").innerHTML =
      "<h1>404</h1><p>Page not found.</p>";
  });
</script>
