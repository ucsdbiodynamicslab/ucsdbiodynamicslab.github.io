name: Update Publications

on:
  schedule:
    - cron: "0 12 */14 * *"   # approximately every 2 weeks at 12:00 UTC
  workflow_dispatch:

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml python-dateutil

      - name: Run publication fetch script
        run: python assets/python/fetch_publications.py
        working-directory: ${{ github.workspace }}
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}

      - name: Commit updated publications
        run: |
          git config user.name "publications-bot"
          git config user.email "publications-bot@users.noreply.github.com"
          git add _data/biodynamics-lab/publications.yml
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update publications"
          git push